server {
    include /etc/nginx/conf.d/cloudflare-ips.conf;

    listen 80;
    server_name _;
    root /var/www/html;
    index index.php index.html;
    client_max_body_size 64M;
    server_tokens off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Logging
    access_log /var/log/wp_app/nginx.access.log;
    error_log  /var/log/wp_app/nginx.error.log;

    # --- SECURITY: block sensitive files ---
    # Hidden/config files (.htaccess, .user.ini, .env, .git, .DS_Store, etc.)
    location ~ /\.(ht|user\.ini|env|git|svn|DS_Store) {
        deny all;
        return 404;
    }

    # WP install/sample/docker config files
    location ~* /(readme\.html|license\.txt|wp-config-sample\.php|wp-config-docker\.php|wp-config\.php)$ {
        deny all;
        return 404;
    }

    # Block PHP execution in uploads and other writable areas
    location ~* /wp-content/uploads/.*\.(php|phtml|phps|php[0-9]|pl|py|jsp|asp|sh|cgi)$ {
        deny all;
        return 404;
    }

    # No PHP in wp-content/themes uploads or plugin caches that shouldn't execute
    location ~* /wp-content/(uploads|cache|backup|backups|snapshots)/.*\.php$ {
        deny all;
        return 404;
    }

    # Restrict xmlrpc.php (common brute-force/amplification target)
    # If you don't use Jetpack/mobile app, you can deny all instead
    location = /xmlrpc.php {
        deny all;
        return 404;
    }

    # --- ROUTING ---
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location = /wp-admin/admin-ajax.php {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
    }

    # --- STATIC ASSETS ---
    location = /favicon.ico { log_not_found off; access_log off; }
    location = /robots.txt  { log_not_found off; access_log off; allow all; }

    location ~* \.(css|gif|ico|jpeg|jpg|js|png|svg|webp|avif|woff|woff2|ttf|eot)$ {
        expires max;
        log_not_found off;
        access_log off;
    }

    location ~* /wp-content/uploads/dup-pro/.*\.(zip|daf|sql|log)$ {
        deny all;
        return 404;
    }

    # --- PROJECT SERVER-LEVEL OVERRIDES ---
    # Drop-in for per-project config at server{} scope: new `location` blocks,
    # extra server-level directives, etc. Populated from
    # overrides/configs/server.d/*.conf by apply-overrides.sh.
    #
    # Loaded LAST, so the base security/routing rules above win for any
    # overlapping regex match. Constraints (nginx semantics):
    #   - You cannot redefine a directive already set once in this server block
    #     (nginx errors on duplicates) — server.d is for ADDITIONS.
    #   - You cannot redefine an existing `location` — only add new ones.
    # To change a base server-level directive, replace nginx.conf wholesale
    # (a different mechanism — see README).
    include /etc/nginx/server.d/*.conf;
}