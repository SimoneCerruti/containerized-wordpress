# compose.base.yml — versioned, shipped via the release tarball into base/
#
# !!! DO NOT EDIT THIS FILE IN A PROJECT !!!
# It lives at <project>/base/compose.base.yml and is REPLACED on every
# `wpbase update`. Per-project customization belongs in the project's
# docker-compose.yml (which `include:`s this file and can override service
# fields via Compose's standard merge rules).
#
# Projects include this in their own docker-compose.yml:
#
#   include:
#     - path: base/compose.base.yml
#       project_directory: .
#
# `project_directory: .` makes the relative paths below (build context,
# Dockerfile location) resolve from the project root rather than from
# `base/`.
#
# Requires Docker Compose v5.1+. The project's docker-compose.yml `include:`s
# this file AND redefines the `wp` service to add per-project labels/networks;
# Compose only merges an overridden imported service from v5.1+ (v2.x errors
# with "services.wp conflicts with imported resource").
#
# This file defines the standard WP service shape (build, healthcheck,
# named volumes, env_file). Projects layer on top:
#   - container_name
#   - networks (Traefik / external)
#   - traefik labels
#   - additional services (db, redis, etc.)
#   - any extra volumes (e.g. bind-mount uploads for backup)
#
# See compose.example.yml at the repo root for a reference project compose.

services:
  wp:
    build:
      context: .
      dockerfile: base/Dockerfile.base
      args:
        BUILD_ROOT: base
    restart: unless-stopped
    env_file:
      - .env.wordpress
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - wp_html:/var/www/html
      - wp_logs:/var/log/wp_app
      - wp_malware_state:/var/lib/wp-malware-scan

volumes:
  wp_html:
  wp_logs:
  wp_malware_state: